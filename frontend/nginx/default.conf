# ─── Rate limiting zones ─────────────────────────────────────────────────────
# Limits API calls to 30 req/s per IP; burst of 60 to absorb spikes.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP: allows Google Fonts CDN and Material Symbols used by the app
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data:;
         connect-src 'self';
         frame-ancestors 'none';"
        always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml;

    # ── Static assets — long-lived cache (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers (location blocks inherit but add_header
        # inside a location block replaces parent headers in nginx).
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Prevent response buffering on large uploads (import files)
        proxy_request_buffering off;
        client_max_body_size    20m;

        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
    }

    # ── SPA fallback — all unknown paths serve index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;
}
